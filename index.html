<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海烏烏魚子 · 互動教育訓練</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --gold: #F5C842;
  --gold-mid: #C9952A;
  --gold-dark: #8B6914;
  --gold-glow: rgba(197,149,42,0.2);
  --obsidian: #09090B;
  --navy: #0D0E18;
  --card: #141624;
  --card2: #1C1F35;
  --border: #252A45;
  --text: #EDE0C8;
  --muted: #8A8099;
  --red: #E05A3A;
  --green: #3DB87A;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--obsidian);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.7;overflow-x:hidden;}

/* ── SIDEBAR ── */
#sidebar {
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--navy);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:200;
  transition:transform 0.3s;
}
.sidebar-header {
  padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);
  font-family:'Noto Serif TC',serif;font-size:1rem;
  color:var(--gold);font-weight:700;line-height:1.3;
}
.sidebar-header small{display:block;font-size:0.7rem;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-weight:400;margin-top:0.2rem;}
.sidebar-score {
  padding:0.8rem 1.4rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.8rem;
}
.score-ring{position:relative;width:44px;height:44px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring .bg{stroke:var(--border);}
.score-ring .fill{stroke:var(--gold);stroke-dasharray:100 100;stroke-dashoffset:100;transition:stroke-dashoffset 0.6s;}
.score-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:var(--gold);}
.score-text small{display:block;font-size:0.72rem;color:var(--muted);}
.score-text strong{font-size:0.88rem;color:var(--text);}

#chapter-nav{flex:1;overflow-y:auto;padding:0.6rem 0;}
.nav-item {
  display:flex;align-items:center;gap:0.75rem;
  padding:0.65rem 1.4rem;cursor:pointer;
  font-size:0.84rem;color:var(--muted);
  transition:background 0.2s,color 0.2s;
  border-left:3px solid transparent;
}
.nav-item:hover{background:var(--gold-glow);color:var(--text);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(197,149,42,0.08);}
.nav-item.done .nav-status{color:var(--green);}
.nav-item.done{color:var(--text);}
.nav-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;transition:background 0.2s;}
.nav-item.active .nav-num{background:var(--gold);color:#000;}
.nav-item.done .nav-num{background:var(--green);color:#000;}
.nav-status{margin-left:auto;font-size:0.8rem;}
.sidebar-footer{padding:1rem 1.4rem;border-top:1px solid var(--border);}
.reset-btn{width:100%;padding:0.5rem;font-size:0.78rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;transition:all 0.2s;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}

/* ── MOBILE HEADER ── */
#mobile-header{
  display:none;position:fixed;top:0;left:0;right:0;height:54px;
  background:var(--navy);border-bottom:1px solid var(--border);
  align-items:center;padding:0 1rem;z-index:300;gap:1rem;
}
#hamburger{background:none;border:none;color:var(--gold);font-size:1.4rem;cursor:pointer;}
.mobile-title{font-family:'Noto Serif TC',serif;font-size:0.95rem;color:var(--gold);font-weight:700;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;}

/* ── MAIN ── */
#main{margin-left:260px;min-height:100vh;}

/* ── WELCOME ── */
#welcome-screen {
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:3rem 2rem;
  background:radial-gradient(ellipse 80% 60% at 50% 40%, #150e00, var(--obsidian) 70%);
}
.welcome-inner{text-align:center;max-width:600px;}
.welcome-badge{display:inline-block;font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-mid);border:1px solid var(--gold-dark);padding:0.3rem 1rem;border-radius:20px;margin-bottom:1.5rem;}
.welcome-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;color:var(--gold);line-height:1.2;margin-bottom:1rem;text-shadow:0 0 60px rgba(245,200,66,0.25);}
.welcome-sub{color:var(--muted);font-size:0.95rem;margin-bottom:2.5rem;line-height:1.8;}
.welcome-stats{display:flex;gap:2rem;justify-content:center;margin-bottom:2.5rem;}
.stat-item{text-align:center;}
.stat-num{font-family:'Noto Serif TC',serif;font-size:1.8rem;font-weight:700;color:var(--gold);}
.stat-label{font-size:0.75rem;color:var(--muted);}
.start-btn{background:linear-gradient(135deg,var(--gold-dark),var(--gold-mid));color:#000;font-weight:700;font-size:1rem;padding:0.9rem 2.5rem;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity 0.2s,transform 0.2s;letter-spacing:0.05em;}
.start-btn:hover{opacity:0.88;transform:translateY(-2px);}

/* ── CHAPTER CONTENT ── */
#content-area{display:none;padding:2.5rem 2.5rem 6rem;}
.chapter-header{margin-bottom:2.5rem;}
.ch-tag{font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold-mid);margin-bottom:0.5rem;}
.ch-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.4rem,3vw,2.2rem);font-weight:700;color:var(--gold);line-height:1.3;}
.ch-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin:1rem 0 0;}

/* Content blocks */
.content-block{margin-bottom:2rem;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:1rem;}
.info-card h3{color:var(--gold);font-size:1rem;margin-bottom:0.8rem;font-family:'Noto Serif TC',serif;}
.info-card p,.info-card li{font-size:0.88rem;color:var(--muted);line-height:1.8;}
.info-card ul{padding-left:1.2rem;}
.info-card li{margin-bottom:0.3rem;}
.info-card strong{color:var(--text);}
.highlight-box{background:rgba(197,149,42,0.08);border-left:3px solid var(--gold-mid);padding:1rem 1.2rem;border-radius:0 8px 8px 0;font-size:0.88rem;color:var(--text);margin:0.8rem 0;}
.warn-box{background:rgba(224,90,58,0.08);border-left:3px solid var(--red);padding:1rem 1.2rem;border-radius:0 8px 8px 0;font-size:0.88rem;color:var(--text);margin:0.8rem 0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.tag-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin:0.8rem 0;}
.tag{background:rgba(197,149,42,0.12);border:1px solid var(--gold-dark);color:var(--gold-mid);font-size:0.78rem;padding:0.2rem 0.6rem;border-radius:4px;}

/* Compare table */
.ctable{width:100%;border-collapse:collapse;font-size:0.83rem;margin-top:0.5rem;}
.ctable th,.ctable td{padding:0.8rem;border-bottom:1px solid var(--border);vertical-align:top;text-align:left;}
.ctable th{background:var(--card2);color:var(--muted);}
.ctable th.g{color:var(--gold);}
.ctable th.r{color:var(--red);}
.ctable td:first-child{color:var(--gold-mid);font-weight:600;white-space:nowrap;}
.scam-text{color:var(--red);font-size:0.78rem;margin-top:0.2rem;}
.true-text{color:var(--green);font-size:0.78rem;}

/* Color swatches */
.swatch-row{display:flex;gap:0.8rem;flex-wrap:wrap;align-items:flex-end;}
.swatch{text-align:center;}
.swatch-box{width:60px;height:60px;border-radius:6px;margin-bottom:0.4rem;border:1px solid rgba(255,255,255,0.06);}
.swatch-name{font-size:0.72rem;color:var(--muted);}

/* Process steps */
.steps-flow{display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;margin:1rem 0;}
.step-pill{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:0.3rem 0.8rem;font-size:0.78rem;color:var(--muted);white-space:nowrap;}
.step-arrow{color:var(--gold-dark);font-size:0.8rem;}

/* Moisture bars */
.moisture-row{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:0.8rem;}
.m-card{border-radius:10px;padding:1.2rem;text-align:center;border:1px solid var(--border);}
.m-card.bad{background:rgba(224,90,58,0.05);}
.m-card.good{background:rgba(197,149,42,0.08);border-color:var(--gold-dark);box-shadow:0 0 20px rgba(197,149,42,0.1);}
.m-label{font-size:0.72rem;letter-spacing:0.15em;padding:0.2rem 0.6rem;border-radius:10px;display:inline-block;margin-bottom:0.6rem;}
.m-label.bad{background:rgba(224,90,58,0.15);color:var(--red);}
.m-label.good{background:rgba(197,149,42,0.15);color:var(--gold);}
.m-name{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;margin-bottom:0.4rem;}
.m-card.good .m-name{color:var(--gold);}
.m-card.bad .m-name{color:var(--muted);}
.m-desc{font-size:0.8rem;color:var(--muted);line-height:1.6;}

/* Talk rows */
.talk-pair{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.t-card{border-radius:8px;padding:1rem;font-size:0.85rem;line-height:1.7;}
.t-card.avoid{background:rgba(224,90,58,0.06);border:1px solid rgba(224,90,58,0.25);}
.t-card.use{background:rgba(197,149,42,0.06);border:1px solid rgba(197,149,42,0.3);}
.t-label{font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.3rem;}
.avoid .t-label{color:var(--red);}
.use .t-label{color:var(--gold-mid);}
.t-card p{color:var(--muted);}

/* ── QUIZ ── */
#quiz-area{display:none;padding:2.5rem;max-width:700px;}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.quiz-title{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--gold);}
.quiz-progress{font-size:0.82rem;color:var(--muted);}
.quiz-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:2rem;}
.quiz-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:2px;transition:width 0.4s;}
.question-num{font-size:0.75rem;color:var(--gold-mid);letter-spacing:0.2em;margin-bottom:0.6rem;}
.question-text{font-size:1.05rem;color:var(--text);margin-bottom:1.8rem;line-height:1.7;font-weight:500;}
.options{display:flex;flex-direction:column;gap:0.7rem;}
.option-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;text-align:left;color:var(--text);font-size:0.9rem;cursor:pointer;transition:border-color 0.2s,background 0.2s;font-family:'Noto Sans TC',sans-serif;line-height:1.5;}
.option-btn:hover:not(:disabled){border-color:var(--gold-mid);background:rgba(197,149,42,0.06);}
.option-btn.correct{border-color:var(--green);background:rgba(61,184,122,0.1);color:var(--green);}
.option-btn.wrong{border-color:var(--red);background:rgba(224,90,58,0.1);color:var(--red);}
.option-btn.reveal{border-color:var(--green);background:rgba(61,184,122,0.06);color:var(--green);}
.option-btn:disabled{cursor:default;}
.feedback-box{margin-top:1.2rem;padding:1rem 1.2rem;border-radius:8px;font-size:0.88rem;line-height:1.7;display:none;}
.feedback-box.correct{background:rgba(61,184,122,0.1);border:1px solid rgba(61,184,122,0.3);color:var(--green);}
.feedback-box.wrong{background:rgba(224,90,58,0.08);border:1px solid rgba(224,90,58,0.25);color:var(--text);}
.next-btn{margin-top:1.5rem;background:linear-gradient(135deg,var(--gold-dark),var(--gold-mid));color:#000;font-weight:700;font-size:0.9rem;padding:0.75rem 2rem;border:none;border-radius:8px;cursor:pointer;display:none;font-family:'Noto Sans TC',sans-serif;}
.next-btn:hover{opacity:0.88;}

/* ── QUIZ RESULT ── */
#result-area{display:none;padding:2.5rem;max-width:600px;text-align:center;}
.result-icon{font-size:4rem;margin-bottom:1rem;}
.result-title{font-family:'Noto Serif TC',serif;font-size:1.6rem;color:var(--gold);margin-bottom:0.5rem;}
.result-sub{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem;}
.result-score{font-family:'Noto Serif TC',serif;font-size:3rem;font-weight:900;color:var(--gold);margin:1rem 0;}
.result-detail{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.2rem;margin:1.5rem 0;font-size:0.88rem;}
.result-detail .row{display:flex;justify-content:space-between;padding:0.4rem 0;}
.result-detail .row:not(:last-child){border-bottom:1px solid var(--border);}
.result-actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;}
.btn-primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold-mid));color:#000;font-weight:700;font-size:0.9rem;padding:0.75rem 1.8rem;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-secondary{background:transparent;color:var(--text);font-size:0.9rem;padding:0.75rem 1.8rem;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-secondary:hover{border-color:var(--gold-mid);color:var(--gold);}

/* ── FINAL SCREEN ── */
#final-screen{display:none;min-height:100vh;display:none;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center;}
.final-inner{max-width:560px;}
.final-title{font-family:'Noto Serif TC',serif;font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;color:var(--gold);margin-bottom:1rem;}
.final-body{color:var(--muted);font-size:0.95rem;line-height:1.9;margin-bottom:2rem;}
.badge-row{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2rem;}
.badge{background:var(--card);border:1px solid var(--gold-dark);border-radius:10px;padding:1rem;font-size:0.82rem;color:var(--gold-mid);text-align:center;min-width:120px;}
.badge .b-icon{font-size:1.5rem;margin-bottom:0.3rem;}

/* ── CHAPTER COMPLETE BANNER ── */
#ch-complete{display:none;position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#000;font-weight:700;font-size:0.88rem;padding:0.8rem 1.4rem;border-radius:8px;z-index:500;animation:slideup 0.4s;}
@keyframes slideup{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── PROGRESS BAR ── */
#top-bar{position:fixed;top:0;left:260px;right:0;height:3px;background:transparent;z-index:400;}
#top-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width 0.3s;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #sidebar-overlay.show{display:block;}
  #mobile-header{display:flex;}
  #main{margin-left:0;padding-top:54px;}
  #top-bar{left:0;}
  #content-area,#quiz-area,#result-area{padding:1.5rem 1rem 5rem;}
  .two-col,.three-col,.moisture-row,.talk-pair{grid-template-columns:1fr;}
  .ctable{font-size:0.75rem;}
  .ctable th,.ctable td{padding:0.5rem;}
  #welcome-screen{padding:2rem 1rem;}
  .welcome-stats{gap:1.2rem;}
}

/* ── FADE ── */
.fade-in{opacity:0;transform:translateY(16px);transition:opacity 0.5s,transform 0.5s;}
.fade-in.visible{opacity:1;transform:translateY(0);}

/* shelf */
.shelf-row{display:flex;align-items:center;gap:1rem;background:var(--card2);border-radius:8px;padding:0.8rem 1rem;margin-bottom:0.6rem;font-size:0.86rem;}
.shelf-row.rec{border:1px solid var(--gold-dark);}
.shelf-icon{font-size:1.2rem;flex-shrink:0;}
.shelf-dur{font-size:0.8rem;color:var(--muted);}
</style>
</head>
<body>

<div id="top-bar"><div id="top-bar-fill"></div></div>

<!-- MOBILE HEADER -->
<div id="mobile-header">
  <button id="hamburger" onclick="toggleSidebar()">☰</button>
  <span class="mobile-title">海烏教育訓練</span>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">🐟 海烏烏魚子<small>品鑑與銷售培訓系統</small><span id="sidebar-username" style="display:block;font-size:0.72rem;color:var(--gold-mid);margin-top:0.2rem;font-family:'Noto Sans TC',sans-serif;font-weight:400;"></span></div>
  <div class="sidebar-score">
    <div class="score-ring">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <circle class="bg" cx="22" cy="22" r="17" fill="none" stroke-width="3"/>
        <circle class="fill" id="ring-fill" cx="22" cy="22" r="17" fill="none" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div class="score-center" id="ring-pct">0%</div>
    </div>
    <div class="score-text">
      <strong id="score-display">整體進度</strong>
      <small id="score-sub">尚未開始</small>
    </div>
  </div>
  <nav id="chapter-nav"></nav>
  <div class="sidebar-footer">
    <button class="reset-btn" onclick="resetAll()">🔄 重置所有進度</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- WELCOME -->
  <div id="welcome-screen">
    <div class="welcome-inner fade-in">
      <div class="welcome-badge">海烏 60 年傳承 · 內部培訓指南</div>
      <h1 class="welcome-title">透光烏金<br>品鑑與銷售培訓</h1>
      <p class="welcome-sub">完成 8 大章節學習，每章結束後接受測驗。<br>掌握 95% 市場不懂的商業機密，成為烏金品鑑師。</p>
      <div class="welcome-stats">
        <div class="stat-item"><div class="stat-num">8</div><div class="stat-label">培訓章節</div></div>
        <div class="stat-item"><div class="stat-num">32</div><div class="stat-label">測驗題目</div></div>
        <div class="stat-item"><div class="stat-num">60</div><div class="stat-label">年品牌傳承</div></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:0.8rem;margin-bottom:1.5rem;">
        <input id="user-name-input" type="text" placeholder="請輸入您的姓名" maxlength="20"
          style="background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);padding:0.75rem 1.2rem;border-radius:8px;font-size:0.95rem;width:260px;outline:none;text-align:center;font-family:'Noto Sans TC',sans-serif;"
          onfocus="this.style.borderColor='var(--gold-mid)'" onblur="this.style.borderColor='var(--border)'"
          onkeydown="if(event.key==='Enter')startTraining()">
        <div style="font-size:0.75rem;color:var(--muted);">姓名將用於記錄您的測驗成績</div>
      </div>
      <button class="start-btn" onclick="startTraining()">開始培訓 →</button>
    </div>
  </div>

  <!-- CHAPTER CONTENT -->
  <div id="content-area"></div>

  <!-- QUIZ -->
  <div id="quiz-area">
    <div class="quiz-header">
      <div class="quiz-title" id="quiz-ch-title"></div>
      <div class="quiz-progress" id="quiz-progress-text"></div>
    </div>
    <div class="quiz-bar"><div class="quiz-bar-fill" id="quiz-bar-fill"></div></div>
    <div class="question-num" id="q-num"></div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
    <div class="feedback-box" id="q-feedback"></div>
    <button class="next-btn" id="q-next">下一題 →</button>
  </div>

  <!-- RESULT -->
  <div id="result-area">
    <div class="result-icon" id="r-icon"></div>
    <div class="result-title" id="r-title"></div>
    <div class="result-sub" id="r-sub"></div>
    <div class="result-score" id="r-score"></div>
    <div class="result-detail" id="r-detail"></div>
    <div class="result-actions" id="r-actions"></div>
  </div>

let state = {
  started: false,
  currentChapter: 0,
  mode: 'content',
  quizIndex: 0,
  quizAnswered: false,
  scores: {},
  userName: '',
  gasUrl: 'https://script.google.com/macros/s/AKfycbyuGCZ-TF_b-p4k-l5B-hXX5hyO_5EtGCUtKTeligg7PqXKn6eeFfCRzrMpgoLxtrM8/exec',
};

function loadState() {
  try {
    const s = localStorage.getItem('haiwu_state');
    if (s) state = Object.assign(state, JSON.parse(s));
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('haiwu_state', JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  buildNav();
  updateScoreRing();
  if (state.started) {
    document.getElementById('welcome-screen').style.display = 'none';
    showChapter(state.currentChapter, state.mode);
  } else {
    document.getElementById('welcome-screen').style.display = 'flex';
  }
  // fade in welcome
  setTimeout(() => document.querySelector('.welcome-inner')?.classList.add('visible'), 100);
  // scroll progress
  window.addEventListener('scroll', () => {
    const el = document.getElementById('content-area');
    if (!el || el.style.display === 'none') return;
    const h = document.documentElement.scrollHeight - window.innerHeight;
    document.getElementById('top-bar-fill').style.width = (h > 0 ? Math.min(100, window.scrollY / h * 100) : 0) + '%';
  });
});

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function buildNav() {
  const nav = document.getElementById('chapter-nav');
  nav.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const done = state.scores[i] !== undefined;
    const active = state.started && state.currentChapter === i;
    const div = document.createElement('div');
    div.className = `nav-item${active?' active':''}${done?' done':''}`;
    div.innerHTML = `<div class="nav-num">${i+1}</div><span>${ch.title}</span><span class="nav-status">${done ? '✓' : ''}</span>`;
    div.onclick = () => { if (state.started) { goToChapter(i); closeSidebar(); } };
    nav.appendChild(div);
  });
}

function updateNav() {
  buildNav();
  const el = document.getElementById('sidebar-username');
  if (el && state.userName) el.textContent = '👤 ' + state.userName;
}

// ═══════════════════════════════════════
// SCORE RING
// ═══════════════════════════════════════
function updateScoreRing() {
  const total = CHAPTERS.length;
  const done = Object.keys(state.scores).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('ring-fill');
  const circumference = 2 * Math.PI * 17;
  fill.style.strokeDasharray = `${circumference}`;
  fill.style.strokeDashoffset = `${circumference * (1 - pct/100)}`;
  document.getElementById('ring-pct').textContent = pct + '%';
  // calc average score
  const scores = Object.values(state.scores);
  if (scores.length) {
    const avg = scores.reduce((a,b) => a + b.correct / b.total, 0) / scores.length;
    document.getElementById('score-display').textContent = `答題正確率 ${Math.round(avg*100)}%`;
    document.getElementById('score-sub').textContent = `已完成 ${done}/${total} 章節`;
  } else {
    document.getElementById('score-display').textContent = '整體進度';
    document.getElementById('score-sub').textContent = state.started ? '學習中...' : '尚未開始';
  }
}

// NAVIGATION
// ═══════════════════════════════════════
function startTraining() {
  const nameInput = document.getElementById('user-name-input');
  const name = nameInput ? nameInput.value.trim() : '';
  if (!name) {
    if (nameInput) { nameInput.style.borderColor='var(--red)'; nameInput.placeholder='請先輸入姓名！'; nameInput.focus(); }
    return;
  }
  state.userName = name;
  state.gasUrl = 'https://script.google.com/macros/s/AKfycbyuGCZ-TF_b-p4k-l5B-hXX5hyO_5EtGCUtKTeligg7PqXKn6eeFfCRzrMpgoLxtrM8/exec';
  state.started = true;
  state.currentChapter = 0;
  state.mode = 'content';
  saveState();
  document.getElementById('welcome-screen').style.display = 'none';
  showChapter(0, 'content');
}

function goToChapter(i) {
  state.currentChapter = i;
  state.mode = 'content';
  state.quizIndex = 0;
  state.quizAnswered = false;
  saveState();
  showChapter(i, 'content');
}

function showChapter(chIdx, mode) {
  document.getElementById('content-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('final-screen').style.display = 'none';
  updateNav();
  if (mode === 'content') {
    renderContent(chIdx);
  } else if (mode === 'quiz') {
    renderQuiz(chIdx, state.quizIndex || 0);
  } else if (mode === 'result') {
    renderResult(chIdx);
  }
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════
// CONTENT
// ═══════════════════════════════════════
function renderContent(chIdx) {
  const ch = CHAPTERS[chIdx];
  const area = document.getElementById('content-area');
  area.style.display = 'block';
  area.innerHTML = `
    <div class="chapter-header fade-in">
      <div class="ch-tag">${ch.tag}</div>
      <h1 class="ch-title">${ch.title}</h1>
      <div class="ch-divider"></div>
    </div>
    ${ch.content}
    <div style="margin-top:3rem;text-align:center;" class="fade-in">
      <button class="start-btn" onclick="startQuiz(${chIdx})">進入測驗 →</button>
    </div>
  `;
  setTimeout(() => area.querySelectorAll('.fade-in').forEach(el => {
    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting){el.classList.add('visible');obs.disconnect();} },{threshold:0.05});
    obs.observe(el);
  }), 50);
}

// ═══════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════
function startQuiz(chIdx) {
  state.mode = 'quiz';
  state.quizIndex = 0;
  state.quizAnswered = false;
  if (!state.scores[chIdx]) state.scores[chIdx] = { correct: 0, total: 0, answers: [] };
  else { state.scores[chIdx] = { correct: 0, total: 0, answers: [] }; } // reset
  saveState();
  showChapter(chIdx, 'quiz');
}

function renderQuiz(chIdx, qIdx) {
  const ch = CHAPTERS[chIdx];
  const q = ch.quiz[qIdx];
  const total = ch.quiz.length;
  const area = document.getElementById('quiz-area');
  area.style.display = 'block';
  document.getElementById('quiz-ch-title').textContent = ch.title + ' · 測驗';
  document.getElementById('quiz-progress-text').textContent = `${qIdx+1} / ${total}`;
  document.getElementById('quiz-bar-fill').style.width = `${(qIdx/total)*100}%`;
  document.getElementById('q-num').textContent = `第 ${qIdx+1} 題，共 ${total} 題`;
  document.getElementById('q-text').textContent = q.q;
  const optDiv = document.getElementById('q-options');
  optDiv.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${['Ａ','Ｂ','Ｃ','Ｄ'][i]}．${o}`;
    btn.onclick = () => answerQuestion(chIdx, qIdx, i);
    optDiv.appendChild(btn);
  });
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('q-feedback').className = 'feedback-box';
  document.getElementById('q-next').style.display = 'none';
  state.quizAnswered = false;
}

function answerQuestion(chIdx, qIdx, chosen) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const ch = CHAPTERS[chIdx];
  const q = ch.quiz[qIdx];
  const correct = chosen === q.ans;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === chosen && !correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('q-feedback');
  fb.style.display = 'block';
  fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = correct
    ? `✅ <strong>正確！</strong>${q.exp}`
    : `❌ <strong>答錯了。</strong>正確答案是「${q.opts[q.ans]}」。<br>${q.exp}`;
  if (correct) state.scores[chIdx].correct++;
  state.scores[chIdx].total++;
  state.scores[chIdx].answers = state.scores[chIdx].answers || [];
  state.scores[chIdx].answers.push(correct);
  saveState();

  // If last question, submit chapter result to GAS
  const isLastQ = qIdx + 1 >= ch.quiz.length;
  if (isLastQ && state.gasUrl) {
    const sc = state.scores[chIdx];
    const payload = {
      type: 'chapter',
      name: state.userName || '匿名',
      chapterId: chIdx,
      chapterTitle: ch.title,
      correct: sc.correct,
      total: sc.total,
      pct: Math.round(sc.correct / sc.total * 100),
      timestamp: new Date().toISOString()
    };
    fetch(state.gasUrl, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'application/json' }
    }).catch(() => {});

    // If ALL chapters done, also send final summary
    const doneCount = Object.keys(state.scores).length;
    const totalChapters = CHAPTERS.length;
    // +1 because current chapter was just scored
    if (doneCount + 1 >= totalChapters) {
      const allScores = Object.entries(state.scores);
      // include current chapter score
      allScores.push([String(chIdx), sc]);
      const avgPct = Math.round(
        allScores.reduce((a, [, v]) => a + v.correct / v.total, 0) / allScores.length * 100
      );
      const perfect = allScores.filter(([, v]) => v.correct === v.total).length;
      const chapterSummary = CHAPTERS.map((c, i) => {
        const s = i === chIdx ? sc : state.scores[i];
        return s ? `${c.title}:${Math.round(s.correct/s.total*100)}%` : `${c.title}:未完成`;
      }).join('|');
      const finalPayload = {
        type: 'final',
        name: state.userName || '匿名',
        avgPct,
        perfect,
        totalChapters,
        chapterSummary,
        timestamp: new Date().toISOString()
      };
      setTimeout(() => {
        fetch(state.gasUrl, {
          method: 'POST',
          body: JSON.stringify(finalPayload),
          headers: { 'Content-Type': 'application/json' }
        }).catch(() => {});
      }, 800);
    }
  }
  const nextBtn = document.getElementById('q-next');
  nextBtn.style.display = 'inline-block';
  const isLast = qIdx + 1 >= ch.quiz.length;
  nextBtn.textContent = isLast ? '查看結果 →' : '下一題 →';
  nextBtn.onclick = () => {
    if (isLast) {
      state.mode = 'result';
      saveState();
      showChapter(chIdx, 'result');
    } else {
      state.quizIndex = qIdx + 1;
      saveState();
      renderQuiz(chIdx, qIdx + 1);
    }
  };
}

// ═══════════════════════════════════════
// RESULT
// ═══════════════════════════════════════
function renderResult(chIdx) {
  const ch = CHAPTERS[chIdx];
  const sc = state.scores[chIdx] || { correct:0, total: ch.quiz.length };
  const pct = Math.round(sc.correct / sc.total * 100);
  const area = document.getElementById('result-area');
  area.style.display = 'block';
  let icon, title, sub;
  if (pct >= 75) { icon='🎉'; title='太棒了！'; sub='您已充分掌握本章節知識。'; }
  else if (pct >= 50) { icon='💪'; title='不錯！繼續加油'; sub='建議回顧本章節重點，再次強化記憶。'; }
  else { icon='📖'; title='需要再複習一下'; sub='請回到本章節重新閱讀，掌握核心知識後再次測驗。'; }
  document.getElementById('r-icon').textContent = icon;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-sub').textContent = sub;
  document.getElementById('r-score').innerHTML = `${sc.correct} / ${sc.total} <span style="font-size:1.2rem;color:var(--muted);">（${pct}%）</span>`;
  const detail = document.getElementById('r-detail');
  detail.innerHTML = `
    <div class="row"><span>章節</span><span style="color:var(--gold)">${ch.title}</span></div>
    <div class="row"><span>答對題數</span><span style="color:var(--green)">${sc.correct} 題</span></div>
    <div class="row"><span>答錯題數</span><span style="color:var(--red)">${sc.total - sc.correct} 題</span></div>
    <div class="row"><span>正確率</span><span style="color:${pct>=75?'var(--green)':pct>=50?'var(--gold)':'var(--red)'}">${pct}%</span></div>
  `;
  updateScoreRing();
  const actions = document.getElementById('r-actions');
  const isLast = chIdx >= CHAPTERS.length - 1;
  const allDone = Object.keys(state.scores).length >= CHAPTERS.length;
  actions.innerHTML = '';
  // retry
  const retryBtn = document.createElement('button');
  retryBtn.className = 'btn-secondary';
  retryBtn.textContent = '🔄 重新測驗';
  retryBtn.onclick = () => startQuiz(chIdx);
  actions.appendChild(retryBtn);
  // review
  const reviewBtn = document.createElement('button');
  reviewBtn.className = 'btn-secondary';
  reviewBtn.textContent = '📖 回顧章節';
  reviewBtn.onclick = () => goToChapter(chIdx);
  actions.appendChild(reviewBtn);
  // next or finish
  if (!isLast) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-primary';
    nextBtn.textContent = `下一章：${CHAPTERS[chIdx+1].title} →`;
    nextBtn.onclick = () => goToChapter(chIdx + 1);
    actions.appendChild(nextBtn);
  } else if (allDone) {
    const finBtn = document.createElement('button');
    finBtn.className = 'btn-primary';
    finBtn.textContent = '🏅 查看培訓完成證書';
    finBtn.onclick = showFinal;
    actions.appendChild(finBtn);
  }
}

// ═══════════════════════════════════════
// FINAL
// ═══════════════════════════════════════
function showFinal() {
  document.getElementById('content-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  const final = document.getElementById('final-screen');
  final.style.display = 'flex';
  // calc badges
  const scores = Object.entries(state.scores);
  const avgPct = scores.length ? Math.round(scores.reduce((a,[,v]) => a + v.correct/v.total, 0) / scores.length * 100) : 0;
  const perfect = scores.filter(([,v]) => v.correct === v.total).length;
  const badges = document.getElementById('final-badges');
  badges.innerHTML = `
    <div class="badge"><div class="b-icon">📚</div>完成全部<br>${CHAPTERS.length} 章節</div>
    <div class="badge"><div class="b-icon">🎯</div>平均正確率<br>${avgPct}%</div>
    <div class="badge"><div class="b-icon">🏆</div>滿分章節<br>${perfect} 個</div>
    <div class="badge"><div class="b-icon">🐟</div>烏金品鑑師<br>認證</div>
  `;
  // ── 送出最終完成紀錄到 Google Sheets ──
  if (state.gasUrl && scores.length >= CHAPTERS.length && !state.finalSent) {
    state.finalSent = true;
    saveState();
    const chapterSummary = CHAPTERS.map((c, i) => {
      const s = state.scores[i];
      return s ? `${c.title}:${Math.round(s.correct/s.total*100)}%` : `${c.title}:未完成`;
    }).join(' | ');
    fetch(state.gasUrl, {
      method: 'POST',
      body: JSON.stringify({
        type: 'final',
        name: state.userName || '匿名',
        avgPct,
        perfect,
        totalChapters: CHAPTERS.length,
        chapterSummary,
        timestamp: new Date().toISOString()
      }),
      headers: { 'Content-Type': 'application/json' }
    }).catch(() => {});
  }
}

// ═══════════════════════════════════════
// SIDEBAR MOBILE
// ═══════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ═══════════════════════════════════════
// RESET
// ═══════════════════════════════════════
function resetAll() {
  if (!confirm('確定要重置所有進度嗎？')) return;
  localStorage.removeItem('haiwu_state');
  state = { started:false, currentChapter:0, mode:'content', quizIndex:0, quizAnswered:false, scores:{} };
  document.getElementById('content-area').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('welcome-screen').style.display = 'flex';
  document.getElementById('top-bar-fill').style.width = '0%';
  buildNav();
  updateScoreRing();
}
</script>
